<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Fit - Produtividade IA no Comercial</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Mono&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-dark': '#080A0F',
                        'surface-dark': '#0E1118',
                        'aqua': '#4FFFB0',
                        'purple': '#7B61FF',
                        'google-blue': '#4285F4',
                        'notebook-green': '#34A853',
                        'gamma-orange': '#FF5C35',
                        'claude-salmon': '#CC785C',
                        'perplexity-cyan': '#20C0C0',
                    },
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        display: ['Bebas Neue', 'cursive'],
                        mono: ['DM Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #080A0F;
            color: white;
            overflow: hidden;
            margin: 0;
            font-family: 'DM Sans', sans-serif;
        }

        .snap-container {
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .slide {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        /* Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        .glass-nav {
            background: rgba(8, 10, 15, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ambient-glow {
            position: absolute;
            width: 60vmax;
            height: 60vmax;
            background: radial-gradient(circle, var(--glow-color, rgba(79, 255, 176, 0.05)) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        ::-webkit-scrollbar {
            width: 0px;
        }

        .dot-active {
            background-color: #4FFFB0;
            box-shadow: 0 0 10px #4FFFB0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Custom Hook para capturar ícones da Lucide de forma simples
        const Icon = ({ name, className }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        // Gerar SVG básico do Lucide
                        const attrs = icon[1];
                        const children = icon[2].map(child => {
                            const [tag, attr] = child;
                            return `<${tag} ${Object.entries(attr).map(([k, v]) => `${k}="${v}"`).join(' ')} />`;
                        }).join('');
                        setSvg(children);
                    }
                }
            }, [name]);

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                    dangerouslySetInnerHTML={{ __html: svg }}
                />
            );
        };

        const FadeUp = ({ children, delay = 0, className = "" }) => (
            <motion.div
                initial={{ opacity: 0, y: 30 }}
                whileInView={{ opacity: 1, y: 0 }}
                viewport={{ once: false }}
                transition={{ duration: 0.8, delay, ease: [0.21, 0.45, 0.32, 0.9] }}
                className={className}
            >
                {children}
            </motion.div>
        );

        const Slide = ({ children, glowColor }) => (
            <section className="slide">
                <div className="ambient-glow" style={{ "--glow-color": glowColor }}></div>
                <div className="relative z-10 w-full max-w-7xl mx-auto">
                    {children}
                </div>
            </section>
        );

        const Card = ({ icon, title, description, color = "white" }) => (
            <div className="glass-card p-8 rounded-3xl group hover:border-white/20 transition-all duration-500">
                <Icon name={icon} className="w-8 h-8 mb-4" style={{ color }} />
                <h4 className="text-xl font-bold mb-2 group-hover:text-aqua transition-colors">{title}</h4>
                <p className="text-white/40 leading-relaxed text-sm">{description}</p>
            </div>
        );

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const containerRef = useRef(null);

            useEffect(() => {
                const handleScroll = () => {
                    if (containerRef.current) {
                        const index = Math.round(containerRef.current.scrollTop / containerRef.current.offsetHeight);
                        setCurrentSlide(index);
                    }
                };
                const container = containerRef.current;
                container.addEventListener('scroll', handleScroll);
                return () => container.removeEventListener('scroll', handleScroll);
            }, []);

            const slidesContent = [
                {
                    key: 0,
                    color: "rgba(79, 255, 176, 0.1)",
                    content: (
                        <div className="flex flex-col items-center md:items-start space-y-6">
                            <FadeUp><span className="font-mono text-purple text-sm tracking-[0.3em] uppercase">Momento de Gestão Comercial</span></FadeUp>
                            <FadeUp delay={0.2}>
                                <h1 className="font-display text-7xl md:text-[9rem] leading-[0.85] text-center md:text-left tracking-tighter">
                                    A Produtividade da IA <br />
                                    <span className="text-aqua">Aplicada no Comercial</span>
                                </h1>
                            </FadeUp>
                            <FadeUp delay={0.4}>
                                <p className="text-white/50 text-lg md:text-2xl max-w-2xl leading-relaxed text-center md:text-left">
                                    Não é sobre tecnologia. É sobre o que o time faz com o <strong>tempo</strong> e o impacto direto no seu <strong>pipeline</strong>.
                                </p>
                            </FadeUp>
                        </div>
                    )
                },
                {
                    key: 1,
                    color: "rgba(123, 97, 255, 0.08)",
                    content: (
                        <div className="text-center space-y-12">
                            <FadeUp><span className="font-mono text-purple text-sm uppercase tracking-widest">O Recurso mais caro</span></FadeUp>
                            <FadeUp delay={0.2}>
                                <h2 className="text-4xl md:text-7xl font-sans italic max-w-5xl mx-auto leading-tight">
                                    "Quantas horas por semana o time gasta com tarefas que <span className="text-purple font-medium not-italic underline decoration-purple/30 underline-offset-8">não são vender?</span>"
                                </h2>
                            </FadeUp>
                            <FadeUp delay={0.4}>
                                <div className="max-w-xl mx-auto glass-card p-8 rounded-3xl border-l-4 border-purple italic text-white/70">
                                    <p className="text-xl md:text-2xl text-left">O vendedor caro está fazendo trabalho administrativo. Fiz a conta do desperdício.</p>
                                </div>
                            </FadeUp>
                        </div>
                    )
                },
                {
                    key: 2,
                    color: "rgba(255, 255, 255, 0.1)",
                    content: (
                        <div className="space-y-12">
                            <FadeUp><h2 className="text-5xl md:text-8xl font-display tracking-tight uppercase">Por que agora?</h2></FadeUp>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <FadeUp delay={0.2}><Card icon="Sparkles" color="#4FFFB0" title="A IA saiu do laboratório" description="Acesso universal via celular. Tecnologia de ponta agora na mão de qualquer SDR." /></FadeUp>
                                <FadeUp delay={0.4}><Card icon="Zap" color="#FF5C35" title="Os 10% de capacidade" description="As ferramentas já estão na mesa, mas usamos apenas 10% do potencial." /></FadeUp>
                            </div>
                        </div>
                    )
                },
                {
                    key: 3,
                    color: "rgba(66, 133, 244, 0.12)",
                    content: (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                            <div className="space-y-8 text-left">
                                <FadeUp>
                                    <div className="inline-block px-3 py-1 bg-google-blue/10 text-google-blue border border-google-blue/20 rounded-full text-[10px] font-mono mb-4 uppercase">Gargalo 1: SDR Travado</div>
                                    <h2 className="text-6xl md:text-8xl font-display text-google-blue leading-none">Tempo de <br/>Resposta</h2>
                                    <p className="text-xl text-white/50 mt-6 leading-relaxed">O lead esfria enquanto o SDR pensa. O Gemini vira o co-piloto.</p>
                                </FadeUp>
                            </div>
                            <div className="space-y-4">
                                <FadeUp delay={0.3}><div className="glass-card p-6 rounded-2xl flex gap-4"><Icon name="MessageSquare" className="text-google-blue"/><div className="text-left font-bold text-lg">5 Segundos<p className="font-normal text-sm text-white/40 leading-tight">Para gerar respostas éticas.</p></div></div></FadeUp>
                                <FadeUp delay={0.5}><div className="glass-card p-6 rounded-2xl flex gap-4"><Icon name="CheckCircle2" className="text-google-blue"/><div className="text-left font-bold text-lg">Timing Preservado<p className="font-normal text-sm text-white/40 leading-tight">Redução drástica no vácuo.</p></div></div></FadeUp>
                            </div>
                        </div>
                    )
                },
                {
                    key: 4,
                    color: "rgba(204, 120, 92, 0.12)",
                    content: (
                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                        <div className="order-2 lg:order-1 space-y-4">
                            <FadeUp delay={0.3}><div className="glass-card p-8 rounded-3xl border-claude-salmon/20 text-left"><Icon name="Brain" className="text-claude-salmon w-10 h-10 mb-4"/><h4 className="text-2xl font-bold">Seu Par Sênior</h4><p className="text-white/40">Use o Claude para validar hipóteses de Win Rate.</p></div></FadeUp>
                            <FadeUp delay={0.5}><div className="glass-card p-8 rounded-3xl italic bg-claude-salmon/5 text-left">"A IA dá o rascunho, você coloca a vivência."</div></FadeUp>
                        </div>
                        <div className="order-1 lg:order-2 text-right">
                             <FadeUp>
                                <div className="inline-block px-3 py-1 bg-claude-salmon/10 text-claude-salmon border border-claude-salmon/20 rounded-full text-[10px] font-mono mb-4 uppercase">Gargalo 2: Estratégia</div>
                                <h2 className="text-6xl md:text-8xl font-display text-claude-salmon leading-none">Visão de <br/>Líder</h2>
                             </FadeUp>
                        </div>
                      </div>
                    )
                },
                {
                    key: 5,
                    color: "rgba(255, 92, 53, 0.12)",
                    content: (
                        <div className="space-y-12 text-left">
                            <FadeUp>
                                <div className="inline-block px-3 py-1 bg-gamma-orange/10 text-gamma-orange border border-gamma-orange/20 rounded-full text-[10px] font-mono mb-4 uppercase">Gargalo 3: Treinamento</div>
                                <h2 className="text-6xl md:text-8xl font-display text-gamma-orange leading-none">Cultura de <br/>Execução</h2>
                            </FadeUp>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <FadeUp delay={0.3}><div className="glass-card p-6 rounded-2xl flex gap-4 items-center"><div className="p-3 bg-gamma-orange/10 rounded-xl"><Icon name="Monitor" className="text-gamma-orange"/></div><div><h4 className="font-bold">Gamma</h4><p className="text-xs text-white/40">Slides prontos em 2 min.</p></div></div></FadeUp>
                                <FadeUp delay={0.5}><div className="glass-card p-6 rounded-2xl flex gap-4 items-center"><div className="p-3 bg-notebook-green/10 rounded-xl"><Icon name="BookOpen" className="text-notebook-green"/></div><div><h4 className="font-bold">NotebookLM</h4><p className="text-xs text-white/40">Cérebro da operação.</p></div></div></FadeUp>
                            </div>
                        </div>
                    )
                },
                {
                    key: 6,
                    color: "rgba(255, 255, 255, 0.05)",
                    content: (
                        <div className="space-y-12">
                            <FadeUp><h2 className="text-5xl md:text-8xl font-display uppercase tracking-tight">O que a IA <span className="text-purple opacity-40">NÃO</span> faz</h2></FadeUp>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
                                {[
                                    {t:"Julgamento", d:"Ela não lê a sala nem sente a pausa no telefone."},
                                    {t:"Relacionamento", d:"Pessoas compram de pessoas. O olho no olho é único."},
                                    {t:"Salvar Processo", d:"Multiplicar zero (falta de processo) continua sendo zero."}
                                ].map((item, i) => (
                                    <FadeUp key={item.t} delay={0.2+i*0.1} className="flex gap-4">
                                        <Icon name="XCircle" className="text-purple shrink-0 mt-1"/>
                                        <div><h4 className="text-xl font-bold mb-1">{item.t}</h4><p className="text-white/40 text-sm leading-tight">{item.d}</p></div>
                                    </FadeUp>
                                ))}
                            </div>
                        </div>
                    )
                },
                {
                    key: 7,
                    color: "rgba(79, 255, 176, 0.1)",
                    content: (
                        <div className="space-y-12 text-left">
                            <FadeUp>
                                <div className="inline-block px-3 py-1 bg-aqua/10 text-aqua border border-aqua/20 rounded-full text-[10px] font-mono mb-4 uppercase">Plano de Ação</div>
                                <h2 className="text-6xl md:text-[8rem] font-display leading-[0.95] tracking-tight">O DIFERENCIAL É <br/><span className="text-aqua">QUEM COMEÇA.</span></h2>
                            </FadeUp>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {[
                                    {n:"01", t:"Ache o Gargalo", d:"Identifique o maior ralo de tempo hoje."},
                                    {n:"02", t:"Escolha UMA ferramenta", d:"Priorize o Gemini ou o Gamma."},
                                    {n:"03", t:"Piloto de 7 Dias", d:"Teste com os melhores do time."}
                                ].map((step, i) => (
                                    <FadeUp key={step.n} delay={0.2+i*0.2}>
                                        <div className="glass-card p-10 rounded-3xl relative overflow-hidden h-full">
                                            <span className="text-6xl font-display absolute -right-2 -bottom-4 text-white/5">{step.n}</span>
                                            <h4 className="text-2xl font-bold mb-4">{step.t}</h4>
                                            <p className="text-white/40 leading-relaxed">{step.d}</p>
                                        </div>
                                    </FadeUp>
                                ))}
                            </div>
                        </div>
                    )
                }
            ];

            return (
                <div className="snap-container" ref={containerRef}>
                    {/* Header */}
                    <nav className={`fixed top-0 left-0 w-full z-50 glass-nav transition-all duration-500 ${currentSlide > 0 ? 'h-16' : 'h-20'}`}>
                        <div className="max-w-7xl mx-auto h-full flex items-center justify-between px-8">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded bg-aqua flex items-center justify-center font-bold text-bg-dark text-xs">NF</div>
                                <span className={`font-display tracking-widest transition-all ${currentSlide > 0 ? 'text-lg' : 'text-2xl'}`}>NEXT FIT <span className="text-aqua">IA</span></span>
                            </div>
                            <div className="font-mono text-xs text-white/30">SLIDE {String(currentSlide + 1).padStart(2, '0')} / {slidesContent.length}</div>
                        </div>
                    </nav>

                    {/* Progress Bar */}
                    <div className="fixed top-[64px] left-0 w-full z-50 h-px bg-white/5 transition-all duration-500" style={{ top: currentSlide > 0 ? '64px' : '80px' }}>
                        <div className="h-full bg-aqua shadow-[0_0_10px_#4FFFB0] transition-all duration-300" style={{ width: `${((currentSlide + 1) / slidesContent.length) * 100}%` }}></div>
                    </div>

                    {slidesContent.map(slide => (
                        <Slide key={slide.key} glowColor={slide.color}>
                            {slide.content}
                        </Slide>
                    ))}

                    {/* Dots */}
                    <div className="fixed right-8 top-1/2 -translate-y-1/2 flex flex-col gap-4 z-40 hidden md:flex">
                        {slidesContent.map((_, i) => (
                            <div key={i} className={`w-2 h-2 rounded-full transition-all duration-500 ${currentSlide === i ? 'dot-active scale-125' : 'bg-white/20'}`} />
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
